<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Auto Date Converter Tools</title>
  <style>
    body {
  font-family: Arial, sans-serif;
  background: #ffffff url("egghead arc.jpg") center/cover no-repeat;
  display: flex;
  justify-content: center;
  align-items: center;   
  min-height: 100vh;
  margin: 0;
}

.container {
  background: rgba(255, 255, 255, 0.2);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  padding: 20px 35px;
  border-radius: 30px;
  width: 500px;
  max-width: 100%;        
  text-align: center;
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  margin-top: 40px;      
  margin-bottom: 120px; 
}

h2 {
  font-size: 45px;
  color:#000000;
  font-family: "Times New Roman", Times, serif;
  margin: 0;
  padding: 10px 80px;
  padding-bottom: 40px;
}

.title-wrapper {
  display:flex;
  flex-direction: column;
  align-items: flex-end;       
  margin-bottom: 20px;
  gap: 10px;                 
}

.title-wrapper button {
  padding: 10px;
  background: rgba(255, 255, 255, 0.2);   
  backdrop-filter: blur(8px);             
  -webkit-backdrop-filter: blur(8px);     
  color: #000000;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 30px;
  font-size: 12px;
  font-weight:bold;
  cursor: pointer;
  transition: all 0.3s ease;
}

.title-wrapper button:hover {
  background: rgba(255, 255, 255, 0.4);   
  box-shadow: 0 0 15px rgba(0,0,0,0.7); 
  transform: translateY(-2px);   
}

#value {
  width: 100%;
  display: block;
  padding: 12px 15px;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 15px;
  font-size: 14px;
  box-sizing: border-box;
  background: rgba(255,255,255,0.15);  
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  color: #000000;                   
}

#value::placeholder {
  color: #000000;           
}

#value:focus {
  border-color: rgba(255,255,255,0.6);
  outline: none;
  box-shadow: 0 0 6px rgba(255,255,255,0.6);
}

.btn-group button {
  margin-top: 25px;
  padding: 10px 15px;
  background: rgba(255, 255, 255, 0.2);   
  backdrop-filter: blur(8px);             
  -webkit-backdrop-filter: blur(8px);     
  color: #000000;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 30px;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.3s ease;
}

.btn-group button:hover {
  background: rgba(255, 255, 255, 0.4);  
  box-shadow: 0 0 15px rgba(0, 0, 0, 0.7); 
  transform: translateY(-2px);         
}

.result {
  margin: 20px auto;
  font-size: 18px;
  color: #000000;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(6px);
  border-radius: 30px;
  border: 1px solid rgba(255,255,255,0.3);
  padding: 15px;
  width: 55%;
  text-align: center;       
}

footer {
  padding-top: 35px;
  color: #000000;
  font-size: 14px;
}

@media (max-width: 768px) {
  h2 {
    font-size: 28px;
  }
  .container {
    padding: 20px;
    border-radius: 20px;
  }
  #value, .btn-group button {
    width: 100%;
    font-size: 16px;
  }
}

@media (max-width: 480px) {
  h2 {
    font-size: 22px;
  }
  .container {
    padding: 15px;
    border-radius: 15px;
  }
  #value, .btn-group button {
    width: 100%;
    font-size: 16px;
    border-radius: 10px;
  }
}

  </style>
</head>
<body>

  <div class="container">
    <h2>Date Converter</h2>

  <div class="title-wrapper">
    <button onclick="backtoindex()">Back to Home</button>
    <button onclick="goToHoursCalculator()">Go to Hours Calculator</button>
  </div>

  <input type="text" id="value" placeholder="Enter 1 Year, 1 Months, 1 Weeks, 1 Days">

  <div class="btn-group">
    <button id="mainBtn" onclick="convert()">Convert</button>
  </div>

  <div class="result" id="output"></div>

  <footer>
    by: Gil Christian B. Alamillo Auto Date Converter | © 2026 All Rights Reserved.
  </footer>
  </div>

  <script>
function goToHoursCalculator() {
  window.location.href = "Hours Calculator.html"; 
}

function backtoindex() {
    window.location.href = "index.html";
  }

function convert() {
  let rawInput = document.getElementById('value').value.trim().toLowerCase();
  let output = document.getElementById('output');

  if (!rawInput) {
    output.innerHTML = "Please enter a value like 1 Year, 12 Months, 1 Week, 1 Day";
    return;
  }

  const yearMatch = rawInput.match(/(\d+)\s*year/);
  const monthMatch = rawInput.match(/(\d+)\s*month/);
  const weekMatch = rawInput.match(/(\d+)\s*week/);
  const dayMatch = rawInput.match(/(\d+)\s*day/);

  let years = yearMatch ? parseInt(yearMatch[1]) : 0;
  let months = monthMatch ? parseInt(monthMatch[1]) : 0;
  let weeks = weekMatch ? parseInt(weekMatch[1]) : 0;
  let days = dayMatch ? parseInt(dayMatch[1]) : 0;
  let breakdown = [];

  if (years > 0) {
    const monthsFromYears = years * 12;
    breakdown.push(`${years} ${years === 1 ? "Year" : "Years"} = ${monthsFromYears} Months`);
  }

  // Months → Years + Remaining Months → Weeks + Days
  if (months > 0) {
    const yearsFromMonths = Math.floor(months / 12);
    const remainingMonths = months % 12;

    if (yearsFromMonths > 0) {
      breakdown.push(`${months} ${months === 1 ? "Month" : "Months"} = ${yearsFromMonths} ${yearsFromMonths === 1 ? "Year" : "Years"}${remainingMonths > 0 ? `, ${remainingMonths} ${remainingMonths === 1 ? "Month" : "Months"}` : ""}`);
    }

    if (remainingMonths > 1) {
      const totalDays = remainingMonths * 30;
      const weeksFromMonths = Math.floor(totalDays / 7);
      const daysFromMonths = totalDays % 7;
      breakdown.push(`${remainingMonths} Months = ${weeksFromMonths} Weeks${daysFromMonths > 0 ? `, ${daysFromMonths} Days` : ""}`);
    } else if (remainingMonths === 1) {
      breakdown.push("1 Month");
    }
  }

  if (weeks > 0) {
    const totalDays = weeks * 7;
    const monthsFromWeeks = Math.floor(totalDays / 30);
    const remainingDays = totalDays % 30;

    if (monthsFromWeeks > 0) {
      breakdown.push(`${weeks} ${weeks === 1 ? "Week" : "Weeks"} = ${monthsFromWeeks} ${monthsFromWeeks === 1 ? "Month" : "Months"}${remainingDays > 0 ? `, ${remainingDays} Days` : ""}`);
    } else {
      breakdown.push(`${weeks} ${weeks === 1 ? "Week" : "Weeks"} = ${totalDays} Days`);
    }
  }

  if (days > 0) {
    if (days >= 30) {
      const monthsFromDays = Math.floor(days / 30);
      const remainingDaysAfterMonths = days % 30;
      breakdown.push(`${days} Days = ${monthsFromDays} ${monthsFromDays === 1 ? "Month" : "Months"}${remainingDaysAfterMonths > 0 ? `, ${remainingDaysAfterMonths} Days` : ""}`);
    } else {
      const weeksFromDays = Math.floor(days / 7);
      const remainingDays = days % 7;
      if (weeksFromDays > 0) {
        breakdown.push(`${days} Days = ${weeksFromDays} ${weeksFromDays === 1 ? "Week" : "Weeks"}${remainingDays > 0 ? `, ${remainingDays} Days` : ""}`);
      } else {
        breakdown.push(`${days} Day`);
      }
    }
  }

  let startDate = new Date();
  let resultDate = new Date(startDate);
  resultDate.setFullYear(resultDate.getFullYear() + years);
  resultDate.setMonth(resultDate.getMonth() + months);
  resultDate.setDate(resultDate.getDate() + (weeks*7) + days);

  const options = { year: 'numeric', month: 'long', day: 'numeric' };
  const formattedStart = startDate.toLocaleDateString('en-US', options);
  const formattedResult = resultDate.toLocaleDateString('en-US', options);

  output.innerHTML = `
    Breakdown:<br>${breakdown.join("<br>")}<br><br>
    Starting Date: ${formattedStart}<br>
    Result Date: <strong>${formattedResult}</strong>
  `;

  let btn = document.getElementById("mainBtn");
  btn.innerText = "Reset";
  btn.onclick = RESET;
}

function RESET() {
  document.getElementById('value').value = "";
  document.getElementById('output').innerHTML = "";

  let btn = document.getElementById("mainBtn");
  btn.innerText = "Convert";
  btn.onclick = convert;
}
</script>
</body>
</html>
