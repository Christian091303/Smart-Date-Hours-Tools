<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
  <meta charset="UTF-8">
  <title>Hours Calculator Tools</title>
  <style>

body {
  font-family: Arial, sans-serif;
  background: #ffffff url("egghead arc.jpg") center/cover no-repeat;
  display: flex;
  justify-content: center;
  align-items: center;   
  min-height: 100vh;
  margin: 0;
}

.container {
  background: rgba(255, 255, 255, 0.2);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  padding: 20px 35px;
  border-radius: 30px;
  width: 500px;
  max-width: 100%;        
  text-align: center;
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  margin-top: 50px;      
  margin-bottom: 120px; 
}

h2 {
  font-size: 45px;
  color:#000000;
  font-family: "Times New Roman", Times, serif;
  margin: 0;
  padding: 10px 80px;
  padding-bottom: 40px;
}

.title-wrapper {
  display: flex;
  flex-direction: column;  
  align-items: flex-end; 
  margin-bottom: 20px;  
  gap: 10px;              
}

.title-wrapper button {
  padding: 10px;
  background: rgba(255, 255, 255, 0.2);   
  backdrop-filter: blur(8px);             
  -webkit-backdrop-filter: blur(8px);     
  color: #000000;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 30px;
  font-size: 12px;
  font-weight:bold;
  cursor: pointer;
  transition: all 0.3s ease;
}

.title-wrapper button:hover {
  background: rgba(255, 255, 255, 0.4);   
  box-shadow: 0 0 15px rgba(0, 0, 0, 0.7); 
  transform: translateY(-2px);   
}

.time-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 10px;
}

.input-wrapper {
  position: relative;
  flex: 1;
}

input[type="time"] {
  width: 80%;
  padding: 10px 35px 10px 10px;
  border: none;
  border-radius: 15px;
  font-size: 15px;
  background: rgba(255,255,255,0.3);
  transition: all 0.3s ease;
}

input[type="time"]:focus {
  outline: none;
  background: rgba(255,255,255,0.5);
  box-shadow: 0 0 8px rgba(0, 0, 0, 0.7);
}

.remove-btn {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  background: transparent;
  border: none;
  color: #ff4d4d;
  font-size: 15px;
  cursor: pointer;
}

.btn-container {
  display: flex;
  justify-content: center;
  gap: 10px;
}

.btn-container button {
  margin-top: 35px;
  padding: 10px 20px;
  background: rgba(255, 255, 255, 0.2);   
  backdrop-filter: blur(8px);             
  -webkit-backdrop-filter: blur(8px);     
  color: #000000;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 30px;
  font-size: 15px;
  font-weight:bold;
  cursor: pointer;
  transition: all 0.3s ease;
}

.btn-container button:hover {
  background: rgba(255, 255, 255, 0.4);  
  box-shadow: 0 0 15px rgba(0, 0, 0, 0.7); 
  transform: translateY(-2px);         
}

.result {
  margin: 20px auto;       
  font-size: 18px;
  color: #000000;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(6px);
  border-radius: 30px;
  border: 1px solid rgba(255,255,255,0.3);
  padding: 15px 10px ;
  width: 40%;
  text-align: center;      
  display: block;           
}

#pdfBtnContainer button {
  padding: 10px 15px;
  background: rgba(255, 255, 255, 0.2);   
  backdrop-filter: blur(8px);             
  -webkit-backdrop-filter: blur(8px);     
  color: #000000;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 30px;
  font-size: 15px;
  font-weight:bold;
  cursor: pointer;
  transition: all 0.3s ease;
}

#pdfBtnContainer button:hover {
  background: rgba(255, 255, 255, 0.4);  
  box-shadow: 0 0 15px rgba(0, 0, 0, 0.7); 
  transform: translateY(-2px);         
}

footer {
  padding-top: 35px;
  color: #000000;
  font-size: 14px;
}

@media (max-width: 768px) {
  h2 {
    font-size: 28px;
  }
  .container {
    padding: 20px 30px;   
    border-radius: 20px;
  }
  .btn-container button {
    font-size: 14px;
    padding: 8px 16px;
  }
  .result {
    font-size: 16px;
  }
}

@media (max-width: 480px) {
  h2 {
    font-size: 22px;
  }
  .container {
    padding: 15px 20px;  
    border-radius: 15px;
  }
  .btn-container {
    flex-direction: column;   
    align-items: stretch;
  }
  .btn-container button {
    width: 100%;           
    font-size: 14px;
    padding: 8px 12px;
  }
  .result {
    margin-left: 0;
    text-align: center;
    font-size: 15px;
    margin-top: 10px;
  }
}

  </style>
</head>
<body>

  <div class="container">

    <div class="title-wrapper">
      <h2>Hours Calculator</h2>
      <button onclick="backtoindex()">Back to Home</button>
      <button onclick="goToConverter()">Go to Date Converter</button>
    </div>
    
    <div id="timeRows">
      <div class="time-row">
        <div class="input-wrapper">
          <input type="time" class="start">
        </div>
        <div class="input-wrapper">
          <input type="time" class="end">
        </div>
      </div>
    </div>

    <div class="btn-container">
      <button onclick="addRow()">Add Time</button>
      <button onclick="calculateTotal()">Compute Totals</button>
      <button onclick="resetForm()">Reset</button>
    </div>
    
    <div class="result" id="output"></div>
    <div id="pdfBtnContainer"></div>

    <table id="summaryTable" style="display:none;">
  <thead>
    <tr>
      <th>Start Time</th>
      <th>End Time</th>
      <th>Total Hours</th>
    </tr>
  </thead>
  <tbody id="summaryBody"></tbody>
</table>

  <footer>
      by: Gil Christian B. Alamillo Hours Calculator | © 2026 All Rights Reserved.
  </footer>
  </div>

  <script>

function goToConverter() {
  window.location.href = "Auto Date Converter.html"; 
}

function backtoindex() {
  window.location.href = "index.html";
}
    
function addRow() {
  let container = document.getElementById("timeRows");
  let row = document.createElement("div");
  row.className = "time-row";
  row.innerHTML = `
    <div class="input-wrapper">
      <input type="time" class="start">
    </div>
    <div class="input-wrapper">
      <input type="time" class="end">
      <button class="remove-btn">❌</button>
    </div>
  `;

  let removeBtn = row.querySelector(".remove-btn");
  removeBtn.addEventListener("click", () => {
    container.removeChild(row);
  });

  container.appendChild(row);
}

function resetForm() {
  document.getElementById("timeRows").innerHTML = `
    <div class="time-row">
      <div class="input-wrapper"><input type="time" class="start"></div>
      <div class="input-wrapper"><input type="time" class="end"></div>
    </div>
  `;
  document.getElementById("output").innerText = "";
  document.getElementById("pdfBtnContainer").innerHTML = "";
}

function formatTime12h(timeStr) {
  const [hour, minute] = timeStr.split(":");
  let h = parseInt(hour, 10);
  const ampm = h >= 12 ? "PM" : "AM";
  h = h % 12 || 12;
  return `${h}:${minute} ${ampm}`;
}

function formatHoursToHM(hours) {
  const h = Math.floor(hours);
  const m = Math.round((hours - h) * 60);
  const hLabel = h === 1 ? "hr" : "hrs";
  const mLabel = m === 1 ? "min" : "mins";
  return `${h} ${hLabel} ${m} ${mLabel}`;
}

function calculateTotal() {
  const rows = document.querySelectorAll("#timeRows .time-row");
  let totalHours = 0;
  const summaryBody = document.getElementById("summaryBody");
  summaryBody.innerHTML = "";

  rows.forEach(row => {
   const start = row.querySelector(".start").value;
   const end = row.querySelector(".end").value;
    if (start && end) {
      let startDate = new Date(`1970-01-01T${start}:00`);
      let endDate = new Date(`1970-01-01T${end}:00`);

      if (endDate < startDate) {
        endDate.setDate(endDate.getDate() + 1);
      }

   const diff = (endDate - startDate) / (1000 * 60 * 60);
      totalHours += diff;

   const tr = document.createElement("tr");
      tr.innerHTML = `<td>${formatTime12h(start)}</td>
                      <td>${formatTime12h(end)}</td>
                      <td>${formatHoursToHM(diff)}</td>`; // <-- formatted
      summaryBody.appendChild(tr);
    }
  });

  document.getElementById("output").innerText = `Total: ${formatHoursToHM(totalHours)}`;

  const pdfContainer = document.getElementById("pdfBtnContainer");
  pdfContainer.innerHTML = "";

  if (totalHours > 0) {
    pdfContainer.innerHTML = '<button id="downloadPDF" class="btn">Download PDF</button>';
    const downloadBtn = document.getElementById("downloadPDF");
    downloadBtn.addEventListener("click", generatePDF);
  }
  return totalHours;
  }

  function generatePDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

  function capitalizeWords(str) {
    if (!str) return "";
    return str
      .split(" ")
      .map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase())
      .join(" ");
  }

  const userName = capitalizeWords(prompt("Enter your Name:", ""));
  const userRole = capitalizeWords(prompt("Enter your Role:", ""));
  const userMonth = capitalizeWords(prompt("Enter your Month:", ""));

  doc.setFontSize(30);
  doc.setFont("helvetica", "bold");
  const pageWidth = doc.internal.pageSize.getWidth();
  const title = "Work Hours Summary Report";
  const textWidth = doc.getTextWidth(title);
  const xPos = (pageWidth - textWidth) / 2;
  doc.text(title, xPos, 20);

  doc.setFontSize(12);
  doc.setFont("helvetica", "normal");
  doc.text(`Name: ${userName}`, 14, 30);
  doc.text(`Role: ${userRole}`, 14, 38);
  doc.text(`Month: ${userMonth}`, 14, 46);

  const totalHours = calculateTotal();
  const formattedTotal = formatHoursToHM(totalHours);

  doc.autoTable({
    html: '#summaryTable',
    startY: 50,
    headStyles: { fillColor: [41, 128, 185], textColor: [255, 255, 255] }, 
    bodyStyles: { fillColor: [255, 255, 255], textColor: [0, 0, 0] }, 
  });

  doc.setFontSize(12);
  doc.setFont("helvetica", "bold");
  doc.text(`Total: ${formattedTotal}`, 14, doc.lastAutoTable.finalY + 10);

  const now = new Date();
  const dateStr = now.toLocaleString();
  doc.setFontSize(10);
  const footerText = `Generated: ${dateStr}`;
  const footerWidth = doc.getTextWidth(footerText);
  const footerX = (pageWidth - footerWidth) / 2;
  doc.text(footerText, footerX, doc.internal.pageSize.height - 10);

  const safeName = userName.replace(/\s+/g, "_");
  const fileDate = now.toISOString().split("T")[0];
  const fileName = `${safeName}_Work_Hours_Summary_${fileDate}.pdf`;

  doc.save(fileName);
}
  </script>
</body>
</html>
