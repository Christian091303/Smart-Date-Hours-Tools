<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Date-Time Tools</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

  <style>

    body {
      font-family: 'Poppins' ,Arial, sans-serif;
      background: #ffffff url("egghead arc.jpg") center/cover no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;   
      min-height: 100vh;
      margin: 0;
    }

    .container {
      display: flex;
      flex-direction: column;  
      justify-content: center; 
      align-items: center;      
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 30px;
      width: 690px;
      padding: 50px;            
      text-align: center;
      font-weight: bolder;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);   
      padding-bottom: 55px;
    }
    h1 {
      font-family: 'Poppins', Arial, sans-serif;
      font-weight: 700;
      font-size: 2.5em;
      text-align: center;
      background: linear-gradient(90deg, #000000, #555555);
      background-clip: text;
      -webkit-background-clip: text;
      margin: 0 0 20px 0;
    }

    h2 {
      font-family: 'Poppins', Arial, sans-serif;
      font-size: 1.5em;
      font-weight: bold;
      color: #000000;
      margin: 0 0 20px 0;
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 10px 20px;
    }

    .btn-group {
      display: flex;
      justify-content: center;
      gap: 30px; 
    }

    button {
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.2);   
      backdrop-filter: blur(8px);             
      -webkit-backdrop-filter: blur(8px);     
      color: #000000;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 30px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.4);   
      box-shadow: 0 0 15px rgba(0,0,0,0.7); 
      transform: translateY(-2px);   
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Welcome to 
    <br>Smart Date & Time Tools</h1>

    <h2>Count Your Hours</h2>

    <div class="btn-group">
        <button onclick="location.href='Hours Calculator.html'">Track your Hours</button>
    </div>
  </div>

</body>
</html>
